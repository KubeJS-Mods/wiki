title:        "Erste Schritte"
description:  "Grundlagen von KubeJS"

warning1:     ">>> warning"
warning2:     "Es ist wichtig zuerst die Grundlagen der Programmierung in JavaScript zu verstehen, bevor du startest KubeJS zu benutzen!"
warning3:     "<<<"
l1:  "Zunächst benötigst du einen Code-Editor. Ein Code-Editor macht deinen Code lesbarer und hilft dir, Fehler zu finden."
l2:  "Wir empfehlen [Visual Studio Code](https://code.visualstudio.com/), das native Unterstützung für JS bietet."
l3:  ""
l4:  "# ProbeJS verwenden"
l5:  "ProbeJS ist ein unverzichtbares Addon für KubeJS, das Code-Vervollständigung auf Basis generierter TypeScript-Dateien ermöglicht."
l6:  "Es kann dir helfen, Methoden und Felder zu finden, und bietet Dokumentation für Methoden, Funktionen und Event-Handler."
l7:  ""
l8:  "Um ProbeJS zu verwenden, musst du zunächst dein Spiel mit ProbeJS und KubeJS starten, eine Welt betreten und den Befehl `/probejs dump` ausführen."
l9:  "Dieser Befehl generiert alle Typings (Dokumentation) im Ordner deines Modpacks."
l10: ""
l11: "Als nächstes musst du den Ordner deines Modpacks (egal ob er .minecraft oder der Name deines Modpacks ist) in Visual Studio Code öffnen und den `kubejs`-Ordner aufrufen."
l12: ""
l13: "# Die Ordnerstruktur"
l14: "Die Kategorie [Folder Structure](https://kubejs.com/wiki/folder-structure) erklärt die `kubejs`-Ordnerstruktur ausführlicher."
l15: "Derzeit gibt es 3 Ordner, die du kennen solltest:"
l16: "- `server_scripts`"
l17: "- `client_scripts`"
l18: "- `startup_scripts`"
l19: "Dies sind **Skript-Ordner**, in denen du deine Skripte schreiben wirst."
l20: ""
l21: "Jetzt bist du bereit, KubeJS zu verwenden!"
l22: "Schau dir die anderen Wiki-Seiten für weitere Informationen an, und wenn du noch Fragen hast, frag gerne im [latvian.dev Discord Server]({discord-url})!"