title       : "Getting Started"
description : "Basics of KubeJS"

warning1    : ">>> warning"
warning2    : "It is mandatory that you learn the basics of programming and JavaScript before you start using KubeJS!"
warning3    : "<<<"
l1:  "Starting off, you will need a code editor. A code editor will make your code more readable, and help you find errors you have made."
l2:  "We recommend [Visual Studio Code](https://code.visualstudio.com/), which has native support for JS."
l3:  ""
l4:  "# Using ProbeJS"
l5:  "ProbeJS is an essential addon for KubeJS that allows for code completion based on generated TypeScript files."
l6:  "It can help you find methods and fields, and provide documentation for methods, functions, and event handlers."
l7:  ""
l8:  "To use ProbeJS, you first need to start up your game with both it and KubeJS installed, go into a world, and run the command `/probejs dump`."
l9:  "This command will generate all the typings (documentation) within your modpack's folder."
l10: ""
l11: "The next thing you need to do is open your modpack's folder (be it named .minecraft, or your modpack's name) in Visual Studio Code and open the `kubejs` folder."
l12: ""
l13: "# The Folder Structure"
l14: "The [Folder Structure](https://kubejs.com/wiki/folder-structure) category explains the `kubejs` folder structure in more depth."
l15: "For now, there are 3 folders that you should be aware of:"
l16: "- `server_scripts`"
l17: "- `client_scripts`"
l18: "- `startup_scripts`"
l19: "These are **Script Folders** in which you'll write your scripts."
l20: ""
l21: "Now, you should be ready to begin using KubeJS!"
l22: "Look to the other wiki pages for more info, and if you have any more questions, feel free to ask in the [latvian.dev Discord Server]({discord-url})!"
